name: Build-Push-Deploy

on:
  push:
    branches: [ "main" ]   # ✅ fixed

jobs:
  build_push_deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: "temurin"
        java-version: "17"

    - name: Build with Maven
      run: mvn clean package -DskipTests   # ✅ improved

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/java-docker-app:${{ github.run_number }} .

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/java-docker-app:${{ github.run_number }}
        docker tag ${{ secrets.DOCKERHUB_USERNAME }}/java-docker-app:${{ github.run_number }} ${{ secrets.DOCKERHUB_USERNAME }}/java-docker-app:latest
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/java-docker-app:latest

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Stop & remove old container
          docker rm -f javaapp || true

          # Pull latest image
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/java-docker-app:latest

          # Run new container
          docker run -d -p 8080:8080 --name javaapp ${{ secrets.DOCKERHUB_USERNAME }}/java-docker-app:latest

          # Cleanup unused images (important)
          docker system prune -af

          # Verify
          docker ps
